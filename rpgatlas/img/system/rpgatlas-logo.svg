<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RPGAtlas logo">
  <!-- RPGAtlas logo — original work, GPL-3.0-or-later (see LICENSE) -->
  <defs>
    <radialGradient id="ra-sea" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2e5887"/>
      <stop offset="100%" stop-color="#142339"/>
    </radialGradient>
    <linearGradient id="ra-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe2a0"/>
      <stop offset="100%" stop-color="#d9a13f"/>
    </linearGradient>
  </defs>
  <!-- charted globe -->
  <circle cx="32" cy="32" r="28" fill="url(#ra-sea)" stroke="url(#ra-gold)" stroke-width="3"/>
  <g fill="none" stroke="#8fb4e0" stroke-width="1" opacity="0.45">
    <ellipse cx="32" cy="32" rx="11" ry="26"/>
    <ellipse cx="32" cy="32" rx="21" ry="26"/>
    <path d="M6.5 32h51M10 20h44M10 44h44"/>
  </g>
  <!-- pixel landmasses (the tile grid) -->
  <g fill="#7fb069" opacity="0.85">
    <rect x="17" y="21" width="5" height="5"/>
    <rect x="22" y="18" width="5" height="5"/>
    <rect x="22" y="23" width="4" height="4"/>
    <rect x="39" y="37" width="5" height="5"/>
    <rect x="42" y="33" width="4" height="4"/>
  </g>
  <!-- compass rose: diagonal points -->
  <polygon points="38,32 44,44 32,38 20,44 26,32 20,20 32,26 44,20"
           fill="#e8d9b0" stroke="#142339" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- compass rose: cardinal needle, two-tone -->
  <path d="M32 5 L36.4 27.6 L32 32 Z M59 32 L36.4 36.4 L32 32 Z M32 59 L27.6 36.4 L32 32 Z M5 32 L27.6 27.6 L32 32 Z"
        fill="url(#ra-gold)" stroke="#142339" stroke-width="0.8" stroke-linejoin="round"/>
  <path d="M32 5 L27.6 27.6 L32 32 Z M59 32 L36.4 27.6 L32 32 Z M32 59 L36.4 36.4 L32 32 Z M5 32 L27.6 36.4 L32 32 Z"
        fill="#a8762a" stroke="#142339" stroke-width="0.8" stroke-linejoin="round"/>
  <circle cx="32" cy="32" r="3.6" fill="url(#ra-gold)" stroke="#142339" stroke-width="1"/>
</svg>
