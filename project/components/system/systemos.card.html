<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:radial-gradient(120% 100% at 30% 0%, #0d1f2e, #060a12 70%);padding:20px;font-family:var(--font-pixel)}
  .row{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SysPanel, SysMenuItem, SurveillanceMeter } = window.AwakenedCalamityDesignSystem_475ed3;
  function Card() {
    const [sel, setSel] = React.useState(0);
    const items = [['◆','STATUS'],['❖','BONDS','3'],['▣','SUPPLIES','12'],['✦','AFFINITIES'],['◇','REACHES','watched'],['⌖','SYSTEM'],['▼','SAVE']];
    return (
      <div className="row">
        <SysPanel title="[ THE SYSTEM ]" width={168}>
          {items.map((it,i) => (
            <SysMenuItem key={it[1]} glyph={it[0]} label={it[1]} right={it[2]} selected={i===sel}
              accent={it[1]==='REACHES'?'var(--sys-warn)':'var(--os-edge)'} onClick={()=>setSel(i)} />
          ))}
        </SysPanel>
        <SysPanel title="STATUS" accent="var(--os-edge)" width={210}>
          <div style={{fontSize:'7px',lineHeight:1.9,color:'var(--os-ink-dim)'}}>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>DESIGNATION</span><span style={{color:'var(--os-ink)'}}>SUBJECT-4471</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>CLASS</span><span style={{color:'var(--os-ink)'}}>Unclassed</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>LOCATION</span><span style={{color:'var(--os-ink)'}}>Mistwood</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span>CREDITS</span><span style={{color:'var(--os-ink)'}}>Cr 240</span></div>
          </div>
          <div style={{marginTop:'10px'}}><SurveillanceMeter value={48} width={186} /></div>
        </SysPanel>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
