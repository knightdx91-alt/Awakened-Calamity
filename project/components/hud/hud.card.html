<!-- @dsCard group="Components" viewport="700x300" name="HUD — vitals & exposure" subtitle="The only stats on the play screen: HP, Mana, Stamina, Exposure" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{padding:0;font-family:var(--font-pixel)}
  .stage{position:relative;min-height:300px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;padding:18px;
    background:linear-gradient(135deg,#5ea845 0%,#67b34d 40%,#cda86a 60%,#357fc5 100%)}
  .stage::after{content:'over bright terrain — note the dark-glass backing + glow';position:absolute;bottom:8px;left:18px;
    font-size:7px;color:#fff;text-shadow:0 1px 2px #000;font-family:var(--font-pixel)}
  .cluster{display:flex;flex-direction:column;gap:4px}
  .lbl{font-size:7px;letter-spacing:2px;color:#fff;text-shadow:0 1px 2px #000;margin-bottom:4px}
  .dark{background:radial-gradient(120% 120% at 50% 0%, #2a1840, #07070d);padding:18px;border-radius:6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { VitalBar, ExposureTag } = window.AwakenedCalamityDesignSystem_475ed3;
  function Card() {
    return (
      <div className="stage">
        <div className="cluster">
          <div className="lbl">ON-SCREEN HUD</div>
          <VitalBar kind="hp" value={72} max={100} />
          <VitalBar kind="mana" value={34} max={60} />
          <VitalBar kind="stamina" value={88} max={100} />
          <ExposureTag hazard="heat" value={64} />
        </div>
        <div className="cluster">
          <div className="lbl">STATES</div>
          <VitalBar kind="hp" value={16} max={100} />
          <ExposureTag hazard="cold" value={40} />
          <ExposureTag hazard="gloom" value={80} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
