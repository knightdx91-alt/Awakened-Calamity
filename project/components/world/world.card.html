<!-- @dsCard group="Components" viewport="700x250" name="World — Hazards, Affinities, Map markers" subtitle="The brand's iconography: shapes + palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0}
  body{background:radial-gradient(120% 120% at 44% 24%, #0a1830 0%, #06101f 80%);padding:20px;font-family:var(--font-mono)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .lbl{font-family:var(--font-pixel);font-size:7px;letter-spacing:2px;color:#6b7a8d;text-transform:uppercase}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { HazardChip, AffinityBadge, MapMarker } = window.AwakenedCalamityDesignSystem_475ed3;
  const hazards = ['heat','cold','toxic','gloom','tempest'];
  const aff = ['ember','tide','verdant','storm','stone','frost','toxin','umbral','lumen','corruption','untethered'];
  const nodes = [['safe','Safe Zone'],['hold','Holdfast'],['route','Route'],['dungeon','Dungeon'],['calamity','Calamity'],['hidden','Hidden'],['water','Sea'],['under','Under']];
  function Card() {
    return (
      <div className="stack">
        <div className="lbl">Hazards</div>
        <div className="row">{hazards.map(h => <HazardChip key={h} hazard={h} />)}</div>
        <div className="lbl">Affinities &amp; meta-types</div>
        <div className="row">{aff.map(a => <AffinityBadge key={a} affinity={a} />)}</div>
        <div className="lbl">Map markers</div>
        <div className="row" style={{ gap: 18 }}>{nodes.map(([t,l]) => <MapMarker key={t} type={t} label={l} />)}</div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
