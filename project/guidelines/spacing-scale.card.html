<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Pixel grid · 2 → 40px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0d1326;padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:14px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:#18b8c8;border-radius:2px;width:18px}
  .nm{font-size:9px;color:#6b7a8d}
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="bar" style="height:2px"></div><div class="nm">1 · 2</div></div>
  <div class="sw"><div class="bar" style="height:4px"></div><div class="nm">2 · 4</div></div>
  <div class="sw"><div class="bar" style="height:6px"></div><div class="nm">3 · 6</div></div>
  <div class="sw"><div class="bar" style="height:8px"></div><div class="nm">4 · 8</div></div>
  <div class="sw"><div class="bar" style="height:10px"></div><div class="nm">5 · 10</div></div>
  <div class="sw"><div class="bar" style="height:14px"></div><div class="nm">6 · 14</div></div>
  <div class="sw"><div class="bar" style="height:20px"></div><div class="nm">8 · 20</div></div>
  <div class="sw"><div class="bar" style="height:32px"></div><div class="nm">10 · 32</div></div>
  <div class="sw"><div class="bar" style="height:40px"></div><div class="nm">12 · 40</div></div>
</div>
</body>
</html>
