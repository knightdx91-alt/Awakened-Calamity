<!-- @dsCard group="Tilesets" viewport="780x380" name="Props & objects" subtitle="32 freestanding objects · transparent · drop onto any terrain" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0d1326;padding:20px;font-family:var(--font-mono);color:#c8d8e8}
  h2{font-family:var(--font-pixel);font-size:10px;color:#80d0e8;letter-spacing:1px;margin:0 0 4px}
  .sub{font-size:11px;color:#6b7a8d;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(8,48px);gap:3px}
  .gt .tile{width:48px;height:48px;image-rendering:pixelated;background-color:#5ea845;
    background-image:var(--props);
    background-size:384px 192px}
  .gt .idx{position:relative;font-size:8px;color:#fff;margin-top:-48px;margin-left:2px;text-shadow:0 0 2px #000,0 0 2px #000}
  .gt .lab{font-size:7.5px;color:#7c93a8;text-align:center;margin-top:2px;line-height:1.15;height:20px}
</style>
</head>
<body>
  <h2>AC-PROPS-16 · objects (on a grass layer for preview)</h2>
  <p class="sub">128×64 px · 32 tiles · transparent background + a soft ground shadow — place on an object layer above terrain</p>
  <div class="grid" id="grid"></div>
<script>
const root=document.documentElement;
root.style.setProperty('--props',"url('../assets/tilesets/ac-props-16.png')");
const NAMES=['chest','chest open','barrel','crate','sack','clay pot','basket','lantern',
'well top','well base','signpost','lamppost','fence ─','fence │','gate','hay bale',
'campfire','tent red','tent blue','stall ◧','stall ◨','statue','fountain top','fountain base',
'gravestone','grave cross','flower pot','bridge ─','bridge │','anvil','cart','signpost'];
const g=document.getElementById('grid');
NAMES.forEach((n,i)=>{const col=i%8,row=(i/8|0);const w=document.createElement('div');w.className='gt';
  w.innerHTML=`<div class="tile" style="background-position:${-col*48}px ${-row*48}px"></div><div class="idx">${i}</div><div class="lab">${n}</div>`;g.appendChild(w);});
</script>
</body>
</html>
