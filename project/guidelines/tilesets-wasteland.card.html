<!-- @dsCard group="Tilesets" viewport="780x360" name="Post-apocalyptic wasteland" subtitle="32 tiles · ruin, rust, ash and toxic sludge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#171210;padding:20px;font-family:var(--font-mono);color:#c8d8e8}
  h2{font-family:var(--font-pixel);font-size:10px;color:#80d0e8;letter-spacing:1px;margin:0 0 4px}
  .sub{font-size:11px;color:#6b7a8d;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(8,48px);gap:3px}
  .gt .tile{width:48px;height:48px;image-rendering:pixelated;background-image:var(--sheet);background-size:384px 192px}
  .gt .idx{position:relative;font-size:8px;color:#fff;margin-top:-48px;margin-left:2px;text-shadow:0 0 2px #000,0 0 2px #000}
  .gt .lab{font-size:7px;color:#7c93a8;text-align:center;margin-top:2px;line-height:1.15;height:20px}
</style>
</head>
<body>
  <h2>POST-APOCALYPTIC WASTELAND</h2>
  <p class="sub">32 tiles · ruin, rust, ash and toxic sludge · 128×64 px · index 0–31</p>
  <div class="grid" id="grid"></div>
<script>
document.documentElement.style.setProperty('--sheet',"url('../assets/tilesets/ac-wasteland-16.png')");
const NAMES=["waste dirt","cracked earth","ash","scorched","dead grass","toxic sludge","toxic pool","rubble","concrete","crack concrete","rebar","asphalt","road line","broken road","scrap","rust floor","sand","crater edge","bone pile","skull","burnt stump","dead tree","barbed wire","sandbags","oil drum","crate","broken wall","shanty","tent","wreckage","grave mound","ruin pillar"];
const g=document.getElementById('grid');
NAMES.forEach((n,i)=>{const col=i%8,row=(i/8|0);const w=document.createElement('div');w.className='gt';
  w.innerHTML='<div class="tile" style="background-position:'+(-col*48)+'px '+(-row*48)+'px"></div><div class="idx">'+i+'</div><div class="lab">'+n+'</div>';g.appendChild(w);});
</script>
</body>
</html>
