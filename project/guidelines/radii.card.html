<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="4 → 14px + pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#1a1410;padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:16px;align-items:center}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bx{width:58px;height:58px;background:var(--fr-body);border:3px solid var(--fr-border);box-shadow:inset 0 0 0 2px #fff}
  .nm{font-size:9px;color:#aca47b}
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="bx" style="border-radius:4px"></div><div class="nm">sm · 4</div></div>
  <div class="sw"><div class="bx" style="border-radius:6px"></div><div class="nm">md · 6</div></div>
  <div class="sw"><div class="bx" style="border-radius:8px"></div><div class="nm">lg · 8</div></div>
  <div class="sw"><div class="bx" style="border-radius:10px"></div><div class="nm">xl · 10</div></div>
  <div class="sw"><div class="bx" style="border-radius:14px"></div><div class="nm">2xl · 14</div></div>
  <div class="sw"><div class="bx" style="border-radius:999px"></div><div class="nm">pill</div></div>
</div>
</body>
</html>
