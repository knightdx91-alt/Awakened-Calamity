<!-- @dsCard group="Colors" viewport="700x150" name="Hazards — five categories" subtitle="Player-facing biome dangers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0a1020;padding:16px;font-family:var(--font-pixel)}
  .row{display:flex;gap:12px}
  .sw{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
  .chip{width:100%;height:54px;border-radius:6px}
  .nm{font-size:7px;color:#c8d8e8}
  .hex{font-size:6px;color:#6b7a8d}
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#e8632a;box-shadow:0 0 10px #e8632a66"></div><div class="nm">Heat</div><div class="hex">#e8632a</div></div>
  <div class="sw"><div class="chip" style="background:#5bd0e8;box-shadow:0 0 10px #5bd0e866"></div><div class="nm">Cold</div><div class="hex">#5bd0e8</div></div>
  <div class="sw"><div class="chip" style="background:#9be03a;box-shadow:0 0 10px #9be03a66"></div><div class="nm">Toxic</div><div class="hex">#9be03a</div></div>
  <div class="sw"><div class="chip" style="background:#8a6cff;box-shadow:0 0 10px #8a6cff66"></div><div class="nm">Gloom</div><div class="hex">#8a6cff</div></div>
  <div class="sw"><div class="chip" style="background:#e8d23a;box-shadow:0 0 10px #e8d23a66"></div><div class="nm">Tempest</div><div class="hex">#e8d23a</div></div>
</div>
</body>
</html>
