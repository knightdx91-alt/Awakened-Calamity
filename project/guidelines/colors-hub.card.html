<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:radial-gradient(120% 90% at 50% 0%, #0d1326 0%, #07070d 70%);padding:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px}
  .sw{flex:1;height:84px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:7px}
  .nm{font-size:9px;margin-bottom:2px;color:#c8d8e8}
  .hex{font-size:9px;color:#6b7a8d}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#0d1326"><div class="nm">bg-0</div><div class="hex">#0d1326</div></div>
  <div class="sw" style="background:#11131f;box-shadow:0 0 0 1px #18b8c8"><div class="nm">panel</div><div class="hex">#11131f</div></div>
  <div class="sw" style="background:#18b8c8"><div class="nm" style="color:#04141a">cyan</div><div class="hex" style="color:#04141a">#18b8c8</div></div>
  <div class="sw" style="background:#7ee0ec"><div class="nm" style="color:#04141a">cyan-lt</div><div class="hex" style="color:#04141a">#7ee0ec</div></div>
  <div class="sw" style="background:#0a1830"><div class="nm">sea</div><div class="hex">#0a1830</div></div>
  <div class="sw" style="background:#c8d8e8"><div class="nm" style="color:#11131f">ink</div><div class="hex" style="color:#4a5a6d">#c8d8e8</div></div>
</div>
</body>
</html>
