<!-- @dsCard group="Colors" viewport="700x150" name="The System — cold" subtitle="Neon-on-black: the antagonist's palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#07070d;padding:16px;font-family:var(--font-pixel)}
  .row{display:flex;gap:10px}
  .sw{flex:1;height:84px;border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;padding:7px;background:rgba(0,6,20,0.93)}
  .chip{width:20px;height:20px;border-radius:4px;margin-bottom:6px}
  .nm{font-size:6.5px;letter-spacing:1px;margin-bottom:2px}
  .hex{font-size:6.5px;opacity:.7}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="border:1px solid #00ccff;box-shadow:0 0 6px rgba(0,200,255,.35)"><div class="chip" style="background:#00ccff;box-shadow:0 0 6px #00ccff"></div><div class="nm" style="color:#80e8ff">info / cyan</div><div class="hex" style="color:#80e8ff">#00ccff · ink #80e8ff</div></div>
  <div class="sw" style="border:1px solid #f8d000;box-shadow:0 0 6px rgba(248,208,0,.35)"><div class="chip" style="background:#f8d000;box-shadow:0 0 6px #f8d000"></div><div class="nm" style="color:#f8e880">warning</div><div class="hex" style="color:#f8e880">#f8d000 · ink #f8e880</div></div>
  <div class="sw" style="border:1px solid #ff3030;box-shadow:0 0 8px rgba(255,48,48,.5)"><div class="chip" style="background:#ff3030;box-shadow:0 0 8px #ff3030"></div><div class="nm" style="color:#ff9090">danger</div><div class="hex" style="color:#ff9090">#ff3030 · ink #ff9090</div></div>
  <div class="sw" style="border:1px solid #1a2230"><div class="chip" style="background:#02060f;border:1px solid #1a2230"></div><div class="nm" style="color:#80e8ff">panel</div><div class="hex" style="color:#80e8ff">rgba(0,6,20,.93)</div></div>
</div>
</body>
</html>
