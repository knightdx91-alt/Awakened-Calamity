<!DOCTYPE html>
<html lang="en">
<head>

<title>Awakened Calamity — Hub</title>
<link rel="stylesheet" href="../../styles.css" />

<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 80% at 50% 0%, #0d1326 0%, #07070d 70%);color:#c8d8e8;font-family:var(--font-mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;padding:40px 20px}
  .logo{text-align:center}
  .logo-title{font-family:var(--font-pixel);font-size:30px;letter-spacing:2px;background:linear-gradient(90deg,#18b8c8,#7ee0ec,#18b8c8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

<body>
<div id="root"></div>
<script type="text/babel">
const { LaunchCard, MapMarker } = window.AwakenedCalamityDesignSystem_475ed3;

function Hub() {
  const [boot, setBoot] = React.useState('');
  const say = (m) => setBoot(m);
  return (
    <React.Fragment>
      <div className="logo">
        <div className="logo-title">AWAKENED CALAMITY</div>
        <div className="logo-sub">The System helps you</div>
      </div>
      <div className="stack">
        <div className="section-label">Play</div>
        <LaunchCard title="Awakened Calamity" subtitle="GBA-style survival LitRPG · prototype"
          icon={<MapMarker type="safe" size={22} />}
          onClick={() => say('> Booting AwakeningCamp in region «awakened»…')} />

        <div className="section-label">Create</div>
        <LaunchCard title="Map Editor" subtitle="Author zones · saves to the maps branch"
          icon={<MapMarker type="route" size={22} />}
          onClick={() => say('> Opening metatile editor…')} />
        <div className="divider" />
        <div className="section-label">World</div>
        <LaunchCard title="The Four Reaches" subtitle="The Drowned Reach · interactive overview"
          icon={<MapMarker type="calamity" size={22} />}
          onClick={() => say('> Loading world atlas…')} />
        <LaunchCard title="Design Docs" subtitle="Tempo combat · Surveillance · survival"
          icon={<MapMarker type="hidden" size={22} />}
          onClick={() => say('> The comfortable path is the trap.')} />
      </div>
      <div className="boot">{boot}</div>
      <footer>Prototype build · clean original art</footer>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
</script>
