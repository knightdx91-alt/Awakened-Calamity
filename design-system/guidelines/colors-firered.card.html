<!-- @dsCard group="Colors" viewport="700x150" name="FireRed chrome — warm" subtitle="The comfortable in-world UI palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#1a1410;padding:16px;font-family:var(--font-pixel)}
  .row{display:flex;gap:0;border-radius:8px;overflow:hidden;border:3px solid var(--fr-border);box-shadow:inset 0 0 0 2px var(--fr-hi)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px}
  .hex{font-size:6.5px;color:#fff;mix-blend-mode:difference}
  .nm{font-size:6.5px;color:#fff;mix-blend-mode:difference;margin-bottom:2px}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#d5d5bd"><div class="nm">body</div><div class="hex">#d5d5bd</div></div>
  <div class="sw" style="background:#f0f0d8"><div class="nm">body-lt</div><div class="hex">#f0f0d8</div></div>
  <div class="sw" style="background:#62737b"><div class="nm">border</div><div class="hex">#62737b</div></div>
  <div class="sw" style="background:#ffffff"><div class="nm">hi</div><div class="hex">#ffffff</div></div>
  <div class="sw" style="background:#e60808"><div class="nm">red</div><div class="hex">#e60808</div></div>
  <div class="sw" style="background:#b80000"><div class="nm">red-dark</div><div class="hex">#b80000</div></div>
  <div class="sw" style="background:#181818"><div class="nm">text</div><div class="hex">#181818</div></div>
  <div class="sw" style="background:#aca47b"><div class="nm">tan</div><div class="hex">#aca47b</div></div>
</div>
</body>
</html>
