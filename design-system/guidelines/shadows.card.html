<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows — two languages" subtitle="Warm stamped bevel vs. cold neon glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#11131f;padding:22px;font-family:var(--font-mono);display:flex;gap:26px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;align-items:center;gap:10px}
  .nm{font-size:9px;color:#6b7a8d}
  .warm{width:88px;height:56px;background:#d5d5bd;border:3px solid #62737b;border-radius:10px}
  .glow{width:88px;height:56px;border-radius:6px;background:rgba(0,6,20,.93)}
</style>
</head>
<body>
<div class="sw"><div class="warm" style="box-shadow:inset 0 0 0 2px #fff,2px 2px 0 rgba(0,0,0,.35)"></div><div class="nm">window · sm</div></div>
<div class="sw"><div class="warm" style="box-shadow:inset 0 0 0 2px #fff,4px 4px 0 rgba(0,0,0,.4)"></div><div class="nm">window · lg</div></div>
<div class="sw"><div class="glow" style="border:1px solid #00ccff;box-shadow:0 0 6px rgba(0,200,255,.35),inset 0 0 0 1px rgba(0,200,255,.15)"></div><div class="nm">glow · cyan</div></div>
<div class="sw"><div class="glow" style="border:1px solid #ff3030;box-shadow:0 0 14px rgba(255,48,48,.7)"></div><div class="nm">glow · danger</div></div>
<div class="sw"><div class="glow" style="background:#11131f;border:1px solid #000;box-shadow:0 0 0 1px #18b8c8,inset 0 0 0 1px #002830"></div><div class="nm">cyber frame</div></div>
</body>
</html>
