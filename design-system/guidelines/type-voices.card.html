<!-- @dsCard group="Type" viewport="700x180" name="Two voices" subtitle="System corporate-cheer vs. lore elegy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0a0a12;padding:18px;display:flex;gap:16px}
  .col{flex:1}
  .lbl{font-family:var(--font-pixel);font-size:6.5px;letter-spacing:2px;color:#6b7a8d;margin-bottom:10px}
  .sys{font-family:var(--font-pixel);font-size:7.5px;line-height:1.9;color:#80e8ff;background:rgba(0,6,20,.93);border:1px solid #00ccff;border-radius:6px;padding:10px;box-shadow:0 0 8px rgba(0,200,255,.3)}
  .lore{font-family:var(--font-mono);font-size:13px;line-height:1.7;color:#a9c2d4;font-style:italic}
</style>
</head>
<body>
<div class="col">
  <div class="lbl">The System — menacing corporate cheer</div>
  <div class="sys">"Emergency Restore available.<br/>One tap. We've got you.<br/>(Cr + Surveillance)"</div>
</div>
<div class="col">
  <div class="lbl">Lore — quiet, elegiac, human</div>
  <div class="lore">"I… was Marie…"<br/>"guarding the door is all I remember"<br/>"the sky belonged to us, before"</div>
</div>
</body>
</html>
