<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#06101f;padding:16px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .sw{flex:1;height:80px;border-radius:8px;border:2px solid rgba(255,255,255,.25);display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .nm{font-size:11px;font-weight:700;color:#0c2030;margin-bottom:2px}
  .hex{font-size:9px;color:#0c2030;opacity:.7}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#8fd069"><div class="nm">Verdara</div><div class="hex">#8fd069 · grass</div></div>
  <div class="sw" style="background:#cdca63"><div class="nm">Halveth</div><div class="hex">#cdca63 · meadow</div></div>
  <div class="sw" style="background:#6fcb9c"><div class="nm">Calderra</div><div class="hex">#6fcb9c · tropic</div></div>
  <div class="sw" style="background:#e9f2f9"><div class="nm">Vael</div><div class="hex">#e9f2f9 · snow</div></div>
</div>
</body>
</html>
