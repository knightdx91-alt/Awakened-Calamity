<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:radial-gradient(120% 80% at 50% 0%, #0d1326 0%, #07070d 70%);padding:24px;font-family:var(--font-pixel);text-align:center}
  .title{font-size:28px;letter-spacing:2px;background:linear-gradient(90deg,#18b8c8,#7ee0ec,#18b8c8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:9px;letter-spacing:3px;color:#6b7a8d;text-transform:uppercase;margin-top:10px}
  .markers{display:flex;gap:22px;justify-content:center;margin-top:24px}
  .m{display:flex;flex-direction:column;align-items:center;gap:7px}
  .mn{font-family:var(--font-mono);font-size:9px;color:#6b7a8d}
</style>
</head>
<body>
<div class="title">AWAKENED CALAMITY</div>
<div class="sub">The System helps you</div>
<div class="markers">
  <div class="m"><svg width="34" height="34" viewBox="0 0 34 34"><path d="M17 7 L27 17 L17 27 L7 17 Z" fill="#ffd24a" stroke="#fff" stroke-width="1.5"/></svg><div class="mn">Safe</div></div>
  <div class="m"><svg width="34" height="34" viewBox="0 0 34 34"><rect x="10" y="10" width="14" height="14" fill="#ff9a3c" stroke="#3a1d00" stroke-width="1.5" transform="rotate(45 17 17)"/></svg><div class="mn">Holdfast</div></div>
  <div class="m"><svg width="34" height="34" viewBox="0 0 34 34"><path d="M17 9 L24.2 22.6 L9.8 22.6 Z" fill="#b07cff" stroke="#1c0a30" stroke-width="1.2"/></svg><div class="mn">Dungeon</div></div>
  <div class="m"><svg width="34" height="34" viewBox="0 0 34 34"><path d="M17 6 L19.6 13.4 L27.4 13.4 L21 18.2 L23.4 25.6 L17 21 L10.6 25.6 L13 18.2 L6.6 13.4 L14.4 13.4 Z" fill="#ff4d5e" stroke="#3a0008" stroke-width="1.1"/></svg><div class="mn">Calamity</div></div>
  <div class="m"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="9" fill="none" stroke="#ff5cf0" stroke-width="2" stroke-dasharray="2 3"/><text x="17" y="21" text-anchor="middle" font-size="12" fill="#ff5cf0" font-family="monospace">?</text></svg><div class="mn">Hidden</div></div>
</div>
</body>
</html>
