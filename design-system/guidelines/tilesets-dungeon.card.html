<!-- @dsCard group="Tilesets" viewport="780x720" name="Dungeon & cave" subtitle="32 tiles · floors, walls, torches, traps + System rune & portal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0d1326;padding:20px;font-family:var(--font-mono);color:#c8d8e8}
  h2{font-family:var(--font-pixel);font-size:10px;color:#80d0e8;letter-spacing:1px;margin:0 0 4px}
  .sub{font-size:11px;color:#6b7a8d;margin:0 0 14px}
  .section{margin-bottom:24px}
  .grid{display:grid;grid-template-columns:repeat(8,48px);gap:3px}
  .gt .tile{width:48px;height:48px;image-rendering:pixelated;background-image:var(--sheet);background-size:384px 192px}
  .gt .idx{position:relative;font-size:8px;color:#fff;margin-top:-48px;margin-left:2px;text-shadow:0 0 2px #000,0 0 2px #000}
  .gt .lab{font-size:7.5px;color:#7c93a8;text-align:center;margin-top:2px;line-height:1.15;height:20px}
  .scene{image-rendering:pixelated;width:512px;max-width:100%;border:2px solid #000;box-shadow:0 0 0 2px #18b8c8;display:block}
  code{color:#80e8ff;font-size:11px}
</style>
</head>
<body>
<div class="section">
  <h2>DUNGEON ROOM · assembled</h2>
  <p class="sub">Torch-lit walls, pillars, a chest, bones, a brazier — and the System's cyan <code>rune floor</code> + <code>portal</code></p>
  <img class="scene" src="../assets/tilesets/scene-dungeon.png" alt="assembled dungeon room" />
</div>
<div class="section">
  <h2>AC-DUNGEON-16 · the set</h2>
  <p class="sub">128×64 px · 32 tiles · interiors, cave variants, traps, and corruption tie-ins</p>
  <div class="grid" id="grid"></div>
</div>
<script>
document.documentElement.style.setProperty('--sheet',"url('../assets/tilesets/ac-dungeon-16.png')");
const NAMES=['floor','cracked floor','wall top','wall','cave floor','cave wall','mossy wall','plate',
'stairs ↓','stairs ↑','pillar top','pillar base','wall torch','brazier','wood door','barred door',
'spikes','spike trap','rubble','bones','skull','cobweb','crystals','chest',
'lava','dark water','glow shroom','rune floor','portal','cracked floor','wall','cave wall'];
const g=document.getElementById('grid');
NAMES.forEach((n,i)=>{const col=i%8,row=(i/8|0);const w=document.createElement('div');w.className='gt';
  w.innerHTML=`<div class="tile" style="background-position:${-col*48}px ${-row*48}px"></div><div class="idx">${i}</div><div class="lab">${n}</div>`;g.appendChild(w);});
</script>
</body>
</html>
