<!-- @dsCard group="Brand" viewport="700x230" name="The dual identity" subtitle="Warm comfort vs. cold surveillance — the whole brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{margin:0;display:flex;min-height:230px;font-family:var(--font-pixel)}
  .half{flex:1;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .warm{background:#1a1410}
  .cold{background:radial-gradient(120% 100% at 50% 0%, #0d1326, #07070d)}
  .tag{font-size:6.5px;letter-spacing:2px;color:#6b7a8d}
  .win{background:#d5d5bd;border:3px solid #62737b;border-radius:10px;box-shadow:inset 0 0 0 2px #fff,2px 2px 0 rgba(0,0,0,.35);padding:8px 10px;font-size:7.5px;line-height:1.8;color:#181818}
  .sys{background:rgba(0,6,20,.93);border:1px solid #00ccff;border-radius:6px;box-shadow:0 0 8px rgba(0,200,255,.35);padding:8px 10px}
  .sysl{font-size:6px;letter-spacing:1.5px;color:#00ccff;margin-bottom:4px}
  .syst{font-size:7.5px;line-height:1.7;color:#80e8ff}
</style>
</head>
<body>
<div class="half warm">
  <div class="tag">WARM — what you own</div>
  <div class="win">You found a Camp Kit.<br/>Rest, craft, save, cook.</div>
</div>
<div class="half cold">
  <div class="tag">COLD — what the System does to you</div>
  <div class="sys"><div class="sysl">[ THE SYSTEM ]</div><div class="syst">Unauthorized Safe Zone detected.<br/>Register for protection?<br/>(Cr + Surveillance)</div></div>
</div>
</body>
</html>
