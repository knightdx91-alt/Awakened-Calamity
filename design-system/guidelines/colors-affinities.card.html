<!-- @dsCard group="Colors" viewport="700x180" name="Affinities — 9 + 2 meta" subtitle="The combat affinity wheel" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:#0a1020;padding:16px;font-family:var(--font-pixel)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:6px}
  .chip{width:100%;height:40px;border-radius:6px;border:1px solid rgba(0,0,0,.35)}
  .chip.meta{border:1px dashed rgba(255,255,255,.5)}
  .nm{font-size:6.5px;color:#c8d8e8}
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#ef6a2c"></div><div class="nm">Ember</div></div>
  <div class="sw"><div class="chip" style="background:#3aa0e8"></div><div class="nm">Tide</div></div>
  <div class="sw"><div class="chip" style="background:#3ac06a"></div><div class="nm">Verdant</div></div>
  <div class="sw"><div class="chip" style="background:#e8d23a"></div><div class="nm">Storm</div></div>
  <div class="sw"><div class="chip" style="background:#b09060"></div><div class="nm">Stone</div></div>
  <div class="sw"><div class="chip" style="background:#5bd0e8"></div><div class="nm">Frost</div></div>
  <div class="sw"><div class="chip" style="background:#9be03a"></div><div class="nm">Toxin</div></div>
  <div class="sw"><div class="chip" style="background:#8a6cff"></div><div class="nm">Umbral</div></div>
  <div class="sw"><div class="chip" style="background:#ffe79e"></div><div class="nm">Lumen</div></div>
  <div class="sw"><div class="chip meta" style="background:#ff2bd6"></div><div class="nm">Corruption</div></div>
  <div class="sw"><div class="chip meta" style="background:#b9c6d6"></div><div class="nm">Untethered</div></div>
</div>
</body>
</html>
