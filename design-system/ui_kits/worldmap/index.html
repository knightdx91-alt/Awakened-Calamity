<!-- @dsCard group="World Map" viewport="760x520" name="The Four Reaches — world map" subtitle="Bright cartographic overview, interactive" -->
<!-- @startingPoint section="Awakened Calamity" subtitle="World map — the Four Reaches" viewport="760x520" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Awakened Calamity — The Four Reaches</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;height:100%}
  body{background:#06101f;font-family:var(--font-mono),'Courier New',monospace;color:#c8d8e8;overflow:hidden}
  .wrap{position:relative;width:100%;height:100vh}
  svg{width:100%;height:100%;display:block}
  .title{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;text-shadow:0 2px 8px #000}
  .title h1{margin:0;font-family:var(--font-pixel);font-size:15px;color:#80d0e8;letter-spacing:1px}
  .title p{margin:6px 0 0;font-size:11px;color:#7c93a8}
  .panel{position:absolute;background:rgba(6,6,16,.92);border:1px solid #000;box-shadow:0 0 0 2px #18b8c8,0 0 0 3px #000;border-radius:6px}
  #legend{left:12px;bottom:12px;padding:9px 11px;max-width:200px;font-size:11px}
  #legend h2{margin:0 0 6px;font-size:11px;color:#80d0e8;border-bottom:1px solid #18b8c8;padding-bottom:4px}
  .lg{display:flex;align-items:center;gap:8px;padding:2px 2px}
  .lg svg{width:18px;height:18px;flex:0 0 18px}
  #info{right:12px;bottom:12px;width:240px;display:none;overflow:hidden}
  #info.show{display:block}
  #info .hd{background:#0a1830;border-bottom:1px solid #18b8c8;padding:7px 10px;display:flex;justify-content:space-between;align-items:center}
  #info .hd b{color:#80d0e8;font-size:12px}
  #info .hd span{cursor:pointer;color:#7c93a8}
  #info .bd{padding:9px 11px;font-size:11px;line-height:1.55}
  #info .k{color:#6fa6b8}
  #info .hook{margin-top:6px;color:#a9c2d4;font-style:italic}
  .pill{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10px;margin-right:4px;color:#04141a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const TYPES = {
  safe:{c:'var(--node-safe)',label:'Safe Zone'}, hold:{c:'var(--node-hold)',label:'Holdfast'},
  route:{c:'var(--node-route)',label:'Route'}, dungeon:{c:'var(--node-dungeon)',label:'Dungeon'},
  calamity:{c:'var(--node-calamity)',label:'Calamity'}, hidden:{c:'var(--node-hidden)',label:'Hidden'},
};
const HZ = { heat:'#e8632a', cold:'#5bd0e8', toxic:'#9be03a', gloom:'#8a6cff', tempest:'#e8d23a' };

const REGIONS = [
  { n:'VAEL',     sub:'Ascension · 38–60+', cx:400, cy:120, rx:330, ry:86, fill:'#e9f2f9', coast:'#a9c4d8', tc:'#3a4a5a' },
  { n:'CALDERRA', sub:'Mastery · 22–40',    cx:475, cy:318, rx:180, ry:104, fill:'#6fcb9c', coast:'#3a9468', tc:'#0c3026' },
  { n:'VERDARA',  sub:'Onramp · 0–12',      cx:206, cy:496, rx:168, ry:98,  fill:'#8fd069', coast:'#56953f', tc:'#16320c' },
  { n:'HALVETH',  sub:'Specialization · 10–24', cx:592, cy:496, rx:166, ry:96, fill:'#cdca63', coast:'#8f8c38', tc:'#33310a' },
];

const N = [
  // Vael
  {id:'hollowmere',n:'Hollowmere',t:'safe',tier:'T2',x:470,y:108,hook:'Mining town — Coalstrike; the Spine operations.'},
  {id:'veilharrow',n:'Veilharrow',t:'safe',tier:'T3',x:340,y:120,hook:'Cathedral city — Veilspun ghost alchemy.'},
  {id:'cestmark',n:'Cestmark',t:'safe',tier:'T4',x:250,y:128,hook:'Mythcrafters — the only OWPS-aligned guild.'},
  {id:'sunken_ruins',n:'Sunken Ruins',t:'dungeon',tier:'T4',hz:'gloom',x:212,y:96,hook:'MAJOR OWPS site — the buried truth, laid bare.'},
  {id:'frozen_vault',n:'Frozen Vault',t:'calamity',tier:'T4',hz:'cold',x:560,y:84,hook:'Origin Warden — the previous loop\u2019s tutorial boss.'},
  {id:'distortion',n:'The Distortion',t:'calamity',tier:'T4+',x:150,y:140,hook:'the Exile / Sidewise One — knows everything. True-endgame.'},
  // Calderra
  {id:'tidecrown',n:'Tidecrown',t:'safe',tier:'T3',x:430,y:300,hook:'Caldera-lake capital — Tideclaw naval supremacy.'},
  {id:'emberfall',n:'Emberfall',t:'safe',tier:'T3',hz:'heat',x:470,y:360,hook:'Volcano-foot town — Emberforge.'},
  {id:'mount_cinder',n:'Mount Cinder',t:'dungeon',tier:'T3',hz:'heat',x:560,y:312,hook:'Active volcano; Magma super-node.'},
  {id:'caldera_maw',n:'the Caldera Maw',t:'calamity',tier:'T4',hz:'heat',x:520,y:372,hook:'Magma Warden — the two made to keep fighting.'},
  {id:'heavens_spine',n:'Heaven\u2019s Spine',t:'calamity',tier:'T4',hz:'tempest',x:400,y:360,hook:'Sky Sovereign — \u201Cthe sky belonged to us.\u201D'},
  // Verdara
  {id:'dawnhearth',n:'Dawnhearth',t:'safe',tier:'\u2014',x:150,y:520,hook:'START. Origin town & System tutorial; your home.'},
  {id:'saltmere',n:'Saltmere',t:'safe',tier:'T1',x:270,y:500,hook:'Fishing port & dive hub; ferries to the isles.'},
  {id:'greywall',n:'Greywall',t:'hold',tier:'T1',x:138,y:476,hook:'Vanguard Order fort — repels wild sieges.'},
  {id:'mistwood',n:'Mistwood Path',t:'route',tier:'T1',hz:'toxic',x:206,y:496,hook:'Tutorial wilds; silk & herb scavenge.'},
  {id:'frostfoam',n:'Frostfoam Caverns',t:'calamity',tier:'T3',hz:'cold',x:230,y:556,hook:'Rime Warden \u201CMarie\u201D \u2014 \u201CI\u2026 was Marie\u2026\u201D'},
  {id:'null_hollow',n:'Null Hollow',t:'hidden',tier:'T4',hz:'gloom',x:120,y:530,hook:'ANOMALY \u201CSubject Two\u201D \u2014 silent System experiment.'},
  // Halveth
  {id:'goldfield',n:'Goldfield',t:'safe',tier:'T2',x:560,y:500,hook:'Market metropolis — the Pastoral Exchange.'},
  {id:'loomspire',n:'Loomspire',t:'safe',tier:'T2',x:520,y:540,hook:'Forge port — Loomwright steel-grandmaster.'},
  {id:'wyrmgate',n:'Wyrmgate',t:'hold',tier:'T3',x:660,y:476,hook:'Highland keep — Wyrmwarden; dragon country.'},
  {id:'burned_spire',n:'Burned Spire',t:'dungeon',tier:'T3',hz:'heat',x:610,y:520,hook:'Phoenix echo; origin of the roaming trio.'},
  {id:'silvercrown',n:'Silvercrown Summit',t:'calamity',tier:'T4',hz:'heat',x:600,y:452,hook:'Pyre Sovereign \u201CPhoenix\u201D \u2014 \u201Crebirth = trap.\u201D'},
];
const EDGES = [
  ['dawnhearth','mistwood'],['mistwood','saltmere'],['greywall','mistwood'],['mistwood','frostfoam'],
  ['tidecrown','emberfall'],['emberfall','mount_cinder'],['emberfall','caldera_maw'],['tidecrown','heavens_spine'],
  ['goldfield','loomspire'],['goldfield','wyrmgate'],['goldfield','burned_spire'],['burned_spire','silvercrown'],
  ['hollowmere','veilharrow'],['veilharrow','cestmark'],['cestmark','sunken_ruins'],['cestmark','distortion'],
  ['saltmere','loomspire'],['loomspire','tidecrown'],['emberfall','silvercrown'],['tidecrown','hollowmere'],
];

function star(cx,cy,R,p){let d='';for(let i=0;i<p*2;i++){const r=i%2?R*0.45:R;const a=Math.PI/p*i-Math.PI/2;d+=(i?'L':'M')+(cx+Math.cos(a)*r).toFixed(1)+' '+(cy+Math.sin(a)*r).toFixed(1);}return d+'Z';}

function Marker({n,onClick}){
  const c = TYPES[n.t].c;
  const halo = n.hz ? HZ[n.hz] : null;
  let shape;
  if(n.t==='safe') shape=<path d={`M${n.x} ${n.y-8} L${n.x+8} ${n.y} L${n.x} ${n.y+8} L${n.x-8} ${n.y} Z`} fill={c} stroke="#fff" strokeWidth="1.4"/>;
  else if(n.t==='hold') shape=<rect x={n.x-6} y={n.y-6} width="12" height="12" fill={c} stroke="#3a1d00" strokeWidth="1.3" transform={`rotate(45 ${n.x} ${n.y})`}/>;
  else if(n.t==='route') shape=<circle cx={n.x} cy={n.y} r="4" fill={c} stroke="#fff" strokeWidth="1.2"/>;
  else if(n.t==='dungeon') shape=<path d={`M${n.x} ${n.y-7} L${n.x+6.3} ${n.y+4.9} L${n.x-6.3} ${n.y+4.9} Z`} fill={c} stroke="#1c0a30" strokeWidth="1.1"/>;
  else if(n.t==='calamity') shape=<path d={star(n.x,n.y,9,5)} fill={c} stroke="#3a0008" strokeWidth="1"/>;
  else shape=<g><circle cx={n.x} cy={n.y} r="6" fill="none" stroke={c} strokeWidth="1.8" strokeDasharray="2 3"/><text x={n.x} y={n.y+3} textAnchor="middle" fontSize="8" fill={c} fontFamily="monospace">?</text></g>;
  return (
    <g style={{cursor:'pointer'}} onClick={()=>onClick(n)}>
      {halo && <circle cx={n.x} cy={n.y} r="12" fill="none" stroke={halo} strokeWidth="2" opacity="0.6"/>}
      {shape}
    </g>
  );
}

function WorldMap(){
  const [sel,setSel] = React.useState(null);
  const byId = {}; N.forEach(n=>byId[n.id]=n);
  return (
    <div className="wrap">
      <svg viewBox="0 0 800 640" preserveAspectRatio="xMidYMid meet">
        <defs>
          <radialGradient id="ocean" cx="44%" cy="34%" r="90%">
            <stop offset="0%" stopColor="#2f6f9e"/><stop offset="55%" stopColor="#1c4f7a"/><stop offset="100%" stopColor="#0a2440"/>
          </radialGradient>
          <filter id="ls" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="2" dy="7" stdDeviation="7" floodColor="#04101c" floodOpacity="0.5"/></filter>
        </defs>
        <rect x="0" y="0" width="800" height="640" fill="url(#ocean)"/>
        {REGIONS.map((r,i)=>(
          <g key={i}>
            <ellipse cx={r.cx} cy={r.cy} rx={r.rx} ry={r.ry} fill={r.coast} filter="url(#ls)" opacity="0.9"/>
            <ellipse cx={r.cx} cy={r.cy} rx={r.rx-6} ry={r.ry-6} fill="#f5e7a6" opacity="0.9"/>
            <ellipse cx={r.cx} cy={r.cy} rx={r.rx-10} ry={r.ry-10} fill={r.fill} stroke={r.coast} strokeWidth="2"/>
            <text x={r.cx} y={r.cy-r.ry*0.34} textAnchor="middle" fontFamily="var(--font-pixel)" fontSize="13" fill={r.tc} opacity="0.62" letterSpacing="1">{r.n}</text>
            <text x={r.cx} y={r.cy-r.ry*0.34+13} textAnchor="middle" fontFamily="var(--font-mono)" fontSize="9" fill={r.tc} opacity="0.5">{r.sub}</text>
          </g>
        ))}
        {EDGES.map((e,i)=>{const a=byId[e[0]],b=byId[e[1]];if(!a||!b)return null;return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#fbf1cf" strokeWidth="1.6" opacity="0.55" strokeLinecap="round"/>;})}
        {N.map(n=><Marker key={n.id} n={n} onClick={setSel}/>)}
      </svg>

      <div className="title"><h1>THE FOUR REACHES</h1><p>The Drowned Reach · click a place · danger rises by depth</p></div>

      <div className="panel" id="legend">
        <h2>LEGEND</h2>
        {Object.entries(TYPES).map(([k,v])=>(
          <div className="lg" key={k}>
            <svg viewBox="0 0 18 18">
              {k==='safe'&&<path d="M9 2 L16 9 L9 16 L2 9 Z" fill={v.c} stroke="#fff" strokeWidth="1.2"/>}
              {k==='hold'&&<rect x="4" y="4" width="10" height="10" fill={v.c} stroke="#3a1d00" strokeWidth="1.1" transform="rotate(45 9 9)"/>}
              {k==='route'&&<circle cx="9" cy="9" r="4" fill={v.c} stroke="#fff" strokeWidth="1.1"/>}
              {k==='dungeon'&&<path d="M9 3 L15 14 L3 14 Z" fill={v.c} stroke="#1c0a30" strokeWidth="1"/>}
              {k==='calamity'&&<path d={star(9,9,7,5)} fill={v.c} stroke="#3a0008" strokeWidth="0.9"/>}
              {k==='hidden'&&<circle cx="9" cy="9" r="6" fill="none" stroke={v.c} strokeWidth="1.6" strokeDasharray="2 3"/>}
            </svg>
            <span>{v.label}</span>
          </div>
        ))}
      </div>

      <div className={'panel ' + (sel?'show':'')} id="info">
        {sel && <React.Fragment>
          <div className="hd"><b>{sel.n}</b><span onClick={()=>setSel(null)}>✕</span></div>
          <div className="bd">
            <div><span className="pill" style={{background:TYPES[sel.t].c}}>{TYPES[sel.t].label}</span>
              {sel.hz && <span className="pill" style={{background:HZ[sel.hz],color:'#04141a'}}>{sel.hz}</span>}</div>
            <div style={{marginTop:6}}><span className="k">Tier</span> {sel.tier}</div>
            <div className="hook">{sel.hook}</div>
          </div>
        </React.Fragment>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<WorldMap/>);
</script>
</body>
</html>
