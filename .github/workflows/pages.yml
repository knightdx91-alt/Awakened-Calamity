name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust assets with commit SHA
        run: |
          grep -rl '__CACHE_BUST__' --include='*.html' . | while read -r f; do
            sed -i "s/__CACHE_BUST__/${GITHUB_SHA}/g" "$f"
          done
      - name: Stamp deployed version (for the in-game update check)
        run: printf '%s' "${GITHUB_SHA}" > version.txt
      - name: Exclude EULA/raw source packs from the public deploy
        run: |
          # Raw, EULA-gated asset packs live in the repo for dev but must NOT be
          # publicly hosted on Pages. Strip them from the upload artifact only.
          rm -rf assets-source
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
